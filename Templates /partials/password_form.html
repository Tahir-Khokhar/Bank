{% comment %} Shared change-password form body. Posts to the current URL. {% endcomment %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card">
      <div class="card-body p-4">
        <h5 class="fw-bold mb-4"><i class="bi bi-key me-2"></i>Change Password</h5>
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label">Current Password</label>
            <input class="form-control" type="password" name="current_password" required>
          </div>
          <div class="mb-3">
            <label class="form-label">New Password</label>
            <input class="form-control" type="password" name="new_password" minlength="8" required>
            <div class="form-text">At least 8 characters.</div>
          </div>
          <div class="mb-3">
            <label class="form-label">Confirm New Password</label>
            <input class="form-control" type="password" name="confirm_password" minlength="8" required>
          </div>
          <button class="btn btn-primary w-100"><i class="bi bi-shield-check me-1"></i>Update Password</button>
        </form>
      </div>
    </div>
  </div>
</div>
