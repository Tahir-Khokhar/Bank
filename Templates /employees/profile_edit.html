{% extends 'dashboard/base_dashboard.html' %}
{% block title %}Edit Profile | BankMS{% endblock %}
{% block breadcrumb_items %}<li class="breadcrumb-item"><a href="{% url 'employee-profile' %}">Profile</a></li><li class="breadcrumb-item active">Edit</li>{% endblock %}

{% block content %}
<div class="row justify-content-center"><div class="col-lg-8">
  <div class="card"><div class="card-body p-4">
    <h5 class="fw-bold mb-4"><i class="bi bi-person-gear me-2"></i>Edit Profile</h5>
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      <div class="row g-3">
        <div class="col-md-6"><label class="form-label">Full Name *</label>
          <input class="form-control" name="full_name" value="{{ profile.full_name }}" required></div>
        <div class="col-md-6"><label class="form-label">Email</label>
          <input class="form-control" type="email" name="email" value="{{ profile.email }}"></div>
        <div class="col-md-6"><label class="form-label">Phone</label>
          <input class="form-control" name="phone" value="{{ profile.phone }}"></div>
        <div class="col-md-6"><label class="form-label">CNIC / ID</label>
          <input class="form-control" name="cnic" value="{{ profile.cnic }}"></div>
        <div class="col-12"><label class="form-label">Address</label>
          <textarea class="form-control" name="address" rows="2">{{ profile.address }}</textarea></div>
        <div class="col-12"><label class="form-label">Profile Picture</label>
          <input class="form-control" type="file" name="profile_picture" accept="image/*"></div>
      </div>
      <div class="mt-4 d-flex gap-2">
        <button class="btn btn-primary"><i class="bi bi-check2 me-1"></i>Save Changes</button>
        <a href="{% url 'employee-profile' %}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div></div>
</div></div>
{% endblock %}
