{% extends 'base.html' %}

{% block title %}Employee Login | Bank Management System{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-lg-6">
      <div class="card shadow-sm border-0">
        <div class="card-body p-4">
          <h1 class="h3 fw-bold mb-3"><i class="bi bi-box-arrow-in-right me-2"></i> Employee Login</h1>

          {% include 'partials/form_errors.html' %}

          <form method="post" action="/employees/login/">
            {% csrf_token %}


            <div class="mb-3">
              <label class="form-label">Username</label>
              <input class="form-control" type="text" name="username" required />
              <div class="form-text">Enter your username.</div>
            </div>

            <div class="mb-3">
              <label class="form-label">Password</label>
              <input class="form-control" type="password" name="password" required />
            </div>

            <button type="submit" class="btn btn-primary w-100">
              <i class="bi bi-box-arrow-in-right me-2"></i> Login
            </button>
          </form>

          <div class="d-flex justify-content-between mt-3">
            <a class="btn btn-outline-secondary btn-sm" href="/employees/register/">
              <i class="bi bi-person-plus me-1"></i> Register
            </a>
            <a class="btn btn-link btn-sm" href="/">Back to Home</a>
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
